# PostgreSQL production-ready profile
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/final_project}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:change_me}

spring.h2.console.enabled=false

# Flyway is the source of truth for schema in postgres
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.clean-disabled=true
spring.flyway.baseline-on-migrate=true
