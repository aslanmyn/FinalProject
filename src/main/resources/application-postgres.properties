# PostgreSQL — профиль для подключения к final_project
spring.datasource.url=jdbc:postgresql://localhost:5432/final_project
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:12345678}

# H2 не используется — консоль отключена
spring.h2.console.enabled=false

# JPA для PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# validate — схема управляется Flyway, Hibernate только проверяет соответствие
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway — миграции в src/main/resources/db/migration/
spring.flyway.enabled=true
spring.flyway.clean-disabled=false
