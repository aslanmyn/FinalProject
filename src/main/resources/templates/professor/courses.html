<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Courses</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Professor Portal</span></a>
        <nav class="main-nav">
            <a href="/professor/dashboard">Dashboard</a>
            <span class="user-email" th:text="${userEmail}"></span>
            <a href="/logout" class="btn-logout">Logout</a>
        </nav>
    </div>
</header>
<main class="page">
    <div class="container">
        <h2>My Sections</h2>
        <section class="card">
            <ul>
                <li th:each="course : ${courses}">
                    <a th:href="@{/professor/course/{id}(id=${course.id})}"
                       th:text="${course.subject.code + ' - ' + course.subject.name + ' (Section ' + course.id + ')'}"></a>
                </li>
                <li th:if="${#lists.isEmpty(courses)}">No sections assigned.</li>
            </ul>
        </section>
    </div>
</main>
</body>
</html>
