<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Portal</span></a>
        <nav class="main-nav"><a href="/">Home</a></nav>
    </div>
</header>

<main class="page">
    <div class="container">
        <section class="card" style="max-width:520px;margin:0 auto;">
            <h2>Sign In</h2>
            <p th:if="${error}" class="alert alert-error" th:text="${error}"></p>
            <p th:if="${success}" class="alert alert-success" th:text="${success}"></p>
            <form th:action="@{/do-login}" method="post" class="form-grid">
                <th:block th:replace="~{fragments/csrf :: input}"/>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <p><a href="/register">Create new account</a></p>
        </section>
    </div>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
