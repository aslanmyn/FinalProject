<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - KBTU Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <header class="site-header">
        <div class="header-content">
            <a href="/" class="logo">
                <h1>KBTU</h1>
                <span class="tagline">Portal</span>
            </a>
            <nav class="main-nav">
                <a href="/">Home</a>
            </nav>
        </div>
    </header>

    <main class="login-main">
        <div class="login-card">
            <h2>Sign In</h2>
            <p class="login-hint">Use your KBTU email address</p>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form action="/do-login" method="post" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required
                           placeholder="e.g. a_mustafayev@kbtu.kz or z.teacher@kbtu.kz"
                           th:value="${email}">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password">
                </div>
                <button type="submit" class="btn-submit">Sign In</button>
            </form>

            <div class="login-info">
                <p><strong>Student format:</strong> firstletter_lastname@kbtu.kz <em>(e.g. a_mustafayev@kbtu.kz)</em></p>
                <p><strong>Teacher format:</strong> firstletter.lastname@kbtu.kz <em>(e.g. z.teacher@kbtu.kz)</em></p>
            </div>
        </div>
    </main>
</body>
</html>
