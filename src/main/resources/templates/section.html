<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${section.title}">Section</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Portal</span></a>
        <nav class="main-nav">
            <a href="/news">Portal</a>
            <span class="user-badge" th:text="${userRole}">ROLE</span>
            <span class="user-email" th:text="${userEmail}">user@kbtu.kz</span>
            <a href="/logout" class="btn-logout">Logout</a>
        </nav>
    </div>
</header>

<main class="page">
    <div class="container">
        <div class="breadcrumb"><a href="/news">Portal</a> / <span th:text="${section.title}">Section</span></div>
        <section class="card">
            <h2 th:text="${section.title}">Section</h2>
            <p th:utext="${section.descriptionHtml}"></p>
            <p><a href="/news">Back to portal</a></p>
        </section>
    </div>
</main>
</body>
</html>
