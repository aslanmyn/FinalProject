<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clearance Sheet - KBTU Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Portal</span></a>
            <nav class="main-nav">
                <a href="/news">Portal</a>
                <span class="user-badge student">STUDENT</span>
                <span class="user-email" th:text="${userEmail}"></span>
                <a href="/logout" class="btn-logout">Logout</a>
            </nav>
        </div>
    </header>
    <main class="news-main section-page">
        <div class="container">
            <nav class="breadcrumb"><a href="/news">Portal</a><span class="sep">›</span><span>Clearance Sheet</span></nav>
            <h2>Clearance Sheet</h2>
            <div class="section-content">
                <p th:if="${clearanceSheet == null}">No clearance sheet. Contact the office when you need to complete clearance.</p>
                <table th:if="${clearanceSheet != null}" class="data-table">
                    <thead><tr><th>Department</th><th>Status</th><th>Comment</th></tr></thead>
                    <tbody>
                        <tr th:each="cp : ${clearanceSheet.checkpoints}">
                            <td th:text="${cp.department}"></td>
                            <td th:text="${cp.status}"></td>
                            <td th:text="${cp.comment}"></td>
                        </tr>
                    </tbody>
                </table>
                <a href="/news" class="back-link">← Back to Portal</a>
            </div>
        </div>
    </main>
    <footer class="site-footer"><p>© 2025 KBTU. Almaty, Kazakhstan.</p></footer>
</body>
</html>
