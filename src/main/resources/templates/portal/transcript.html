<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcript</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Student Portal</span></a>
        <nav class="main-nav">
            <a href="/news">Portal</a>
            <span class="user-badge student">STUDENT</span>
            <span class="user-email" th:text="${userEmail}"></span>
            <a href="/logout" class="btn-logout">Logout</a>
        </nav>
    </div>
</header>
<main class="page">
    <div class="container">
        <div class="breadcrumb"><a href="/news">Portal</a> / Transcript</div>
        <h2>Academic Transcript (Unofficial)</h2>
        <section class="card">
            <th:block th:if="${semesterOrder != null and !#lists.isEmpty(semesterOrder)}">
                <th:block th:each="sem : ${semesterOrder}">
                    <h3 class="semester-header" th:text="${sem.name}">Semester</h3>
                    <table class="data-table">
                        <thead><tr><th>Code</th><th>Course</th><th>Credits</th><th>Numeric</th><th>Letter</th><th>GPA</th></tr></thead>
                        <tbody>
                        <tr th:each="f : ${gradesBySemester[sem.id]}">
                            <td th:text="${f.subjectOffering != null and f.subjectOffering.subject != null ? f.subjectOffering.subject.code : '-'}"></td>
                            <td th:text="${f.subjectOffering != null and f.subjectOffering.subject != null ? f.subjectOffering.subject.name : '-'}"></td>
                            <td th:text="${f.subjectOffering != null and f.subjectOffering.subject != null ? f.subjectOffering.subject.credits : '-'}"></td>
                            <td th:text="${f.numericValue}"></td>
                            <td th:text="${f.letterValue != null ? f.letterValue : '-'}"></td>
                            <td th:text="${f.points}"></td>
                        </tr>
                        </tbody>
                    </table>
                </th:block>
            </th:block>
            <table class="data-table" th:if="${semesterOrder == null or #lists.isEmpty(semesterOrder)}">
                <thead><tr><th>Course</th><th>Numeric</th><th>Letter</th><th>Points</th></tr></thead>
                <tbody>
                <tr th:each="f : ${finalGrades}">
                    <td th:text="${f.subjectOffering != null and f.subjectOffering.subject != null ? (f.subjectOffering.subject.code + ' - ' + f.subjectOffering.subject.name) : '-'}"></td>
                    <td th:text="${f.numericValue}"></td>
                    <td th:text="${f.letterValue != null ? f.letterValue : '-'}"></td>
                    <td th:text="${f.points}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(finalGrades)}"><td colspan="4">No published final grades.</td></tr>
                </tbody>
            </table>
            <p class="user-email">For official signed transcript, submit a request in Student Requests.</p>
        </section>
    </div>
</main>
</body>
</html>
