<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcript - KBTU Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Portal</span></a>
            <nav class="main-nav">
                <a href="/news">Portal</a>
                <span class="user-badge student">STUDENT</span>
                <span class="user-email" th:text="${userEmail}"></span>
                <a href="/logout" class="btn-logout">Logout</a>
            </nav>
        </div>
    </header>
    <main class="news-main section-page">
        <div class="container">
            <nav class="breadcrumb"><a href="/news">Portal</a><span class="sep">›</span><span>Transcript</span></nav>
            <h2>Transcript</h2>
            <div class="section-content">
                <table class="data-table">
                    <thead><tr><th>Subject</th><th>Type</th><th>Score</th><th>Max</th></tr></thead>
                    <tbody>
                        <tr th:each="g : ${grades}">
                            <td th:text="${g.subjectOffering.subject.name}"></td>
                            <td th:text="${g.type}"></td>
                            <td th:text="${g.value}"></td>
                            <td th:text="${g.maxValue}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(grades)}"><td colspan="4">No grades recorded</td></tr>
                    </tbody>
                </table>
                <a href="/news" class="back-link">← Back to Portal</a>
            </div>
        </div>
    </main>
    <footer class="site-footer"><p>© 2025 KBTU. Almaty, Kazakhstan.</p></footer>
</body>
</html>
