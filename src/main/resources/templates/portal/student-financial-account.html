<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Financial Account</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Student Portal</span></a>
        <nav class="main-nav">
            <a href="/news">Portal</a>
            <span class="user-badge student">STUDENT</span>
            <span class="user-email" th:text="${userEmail}"></span>
            <a href="/logout" class="btn-logout">Logout</a>
        </nav>
    </div>
</header>
<main class="page">
    <div class="container">
        <div class="breadcrumb"><a href="/news">Portal</a> / Financial Account</div>
        <h2>Student Financial Account</h2>
        <section class="card">
            <p><strong>Balance:</strong> <span th:text="${balance} + ' KZT'"></span></p>
            <p th:if="${financialLock}" class="alert alert-error">Financial hold is active due to overdue invoices.</p>
        </section>

        <section class="portal-section">
            <h3>Invoices</h3>
            <table class="data-table">
                <thead><tr><th>Description</th><th>Amount</th><th>Due Date</th><th>Status</th></tr></thead>
                <tbody>
                <tr th:each="c : ${charges}">
                    <td th:text="${c.description}"></td>
                    <td th:text="${c.amount}"></td>
                    <td th:text="${c.dueDate}"></td>
                    <td th:text="${c.status}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(charges)}"><td colspan="4">No invoices.</td></tr>
                </tbody>
            </table>
        </section>

        <section class="portal-section">
            <h3>Payments</h3>
            <table class="data-table">
                <thead><tr><th>Date</th><th>Amount</th><th>Charge</th></tr></thead>
                <tbody>
                <tr th:each="p : ${payments}">
                    <td th:text="${p.date}"></td>
                    <td th:text="${p.amount}"></td>
                    <td th:text="${p.charge != null ? p.charge.description : '-'}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(payments)}"><td colspan="3">No payments.</td></tr>
                </tbody>
            </table>
        </section>
    </div>
</main>
</body>
</html>
