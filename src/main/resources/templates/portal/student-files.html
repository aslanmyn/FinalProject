<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Files</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Student Portal</span></a>
        <nav class="main-nav">
            <a href="/news">Portal</a>
            <span class="user-badge student">STUDENT</span>
            <span class="user-email" th:text="${userEmail}"></span>
            <a href="/logout" class="btn-logout">Logout</a>
        </nav>
    </div>
</header>
<main class="page">
    <div class="container">
        <div class="breadcrumb"><a href="/news">Portal</a> / Student Files</div>
        <h2>File Assets</h2>
        <section class="card">
            <table class="data-table">
                <thead><tr><th>Name</th><th>Category</th><th>Path</th><th>Uploaded At</th></tr></thead>
                <tbody>
                <tr th:each="f : ${files}">
                    <td th:text="${f.originalName}"></td>
                    <td th:text="${f.category}"></td>
                    <td th:text="${f.storagePath}"></td>
                    <td th:text="${#temporals.format(f.uploadedAt, 'yyyy-MM-dd HH:mm')}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(files)}"><td colspan="4">No files uploaded.</td></tr>
                </tbody>
            </table>
        </section>
    </div>
</main>
</body>
</html>
