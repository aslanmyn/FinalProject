<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Schedule - KBTU Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Portal</span></a>
            <nav class="main-nav">
                <a href="/news">Portal</a>
                <span class="user-badge student">STUDENT</span>
                <span class="user-email" th:text="${userEmail}"></span>
                <a href="/logout" class="btn-logout">Logout</a>
            </nav>
        </div>
    </header>
    <main class="news-main section-page">
        <div class="container">
            <nav class="breadcrumb"><a href="/news">Portal</a><span class="sep">›</span><span>Student Exam Schedule</span></nav>
            <h2>Student Exam Schedule</h2>
            <div class="section-content">
                <table class="data-table">
                    <thead><tr><th>Subject</th><th>Date</th><th>Time</th><th>Room</th><th>Format</th></tr></thead>
                    <tbody>
                        <tr th:each="e : ${exams}">
                            <td th:text="${e.subjectOffering.subject.name}"></td>
                            <td th:text="${e.examDate != null ? #temporals.format(e.examDate, 'yyyy-MM-dd') : '—'}"></td>
                            <td th:text="${e.examTime}"></td>
                            <td th:text="${e.room}"></td>
                            <td th:text="${e.format}"></td>
                        </tr>
                        <tr th:if="${exams == null or #lists.isEmpty(exams)}"><td colspan="5">No exams scheduled</td></tr>
                    </tbody>
                </table>
                <a href="/news" class="back-link">← Back to Portal</a>
            </div>
        </div>
    </main>
    <footer class="site-footer"><p>© 2025 KBTU. Almaty, Kazakhstan.</p></footer>
</body>
</html>
