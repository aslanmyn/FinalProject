<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Personal Data - KBTU Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Portal</span></a>
            <nav class="main-nav">
                <a href="/news">Portal</a>
                <span class="user-badge student">STUDENT</span>
                <span class="user-email" th:text="${userEmail}"></span>
                <a href="/logout" class="btn-logout">Logout</a>
            </nav>
        </div>
    </header>
    <main class="news-main section-page">
        <div class="container">
            <nav class="breadcrumb"><a href="/news">Portal</a><span class="sep">›</span><span>Student Personal Data</span></nav>
            <h2>Student Personal Data</h2>
            <div class="section-content">
                <table class="info-table">
                    <tr><th>Name</th><td th:text="${student.name}"></td></tr>
                    <tr><th>Email</th><td th:text="${student.email}"></td></tr>
                    <tr><th>Passport/ID</th><td th:text="${student.passportNumber != null ? student.passportNumber : '—'}"></td></tr>
                    <tr><th>Address</th><td th:text="${student.address != null ? student.address : '—'}"></td></tr>
                    <tr><th>Phone</th><td th:text="${student.phone != null ? student.phone : '—'}"></td></tr>
                    <tr><th>Emergency Contact</th><td th:text="${student.emergencyContact != null ? student.emergencyContact : '—'}"></td></tr>
                </table>
                <a href="/news" class="back-link">← Back to Portal</a>
            </div>
        </div>
    </main>
    <footer class="site-footer"><p>© 2025 KBTU. Almaty, Kazakhstan.</p></footer>
</body>
</html>
