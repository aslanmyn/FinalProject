<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Attendance</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Student Portal</span></a>
        <nav class="main-nav">
            <a href="/news">Portal</a>
            <span class="user-badge student">STUDENT</span>
            <span class="user-email" th:text="${userEmail}"></span>
            <a href="/logout" class="btn-logout">Logout</a>
        </nav>
    </div>
</header>
<main class="page">
    <div class="container">
        <div class="breadcrumb"><a href="/news">Portal</a> / Class Attendance</div>
        <h2>Class Attendance</h2>
        <section class="card">
            <table class="data-table">
                <thead><tr><th>Date</th><th>Course</th><th>Status</th><th>Reason</th></tr></thead>
                <tbody>
                <tr th:each="a : ${attendance}">
                    <td th:text="${a.date}"></td>
                    <td th:text="${a.subjectOffering.subject.code + ' - ' + a.subjectOffering.subject.name}"></td>
                    <td th:text="${a.status}"></td>
                    <td th:text="${a.reason != null ? a.reason : '-'}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(attendance)}"><td colspan="4">No attendance records yet.</td></tr>
                </tbody>
            </table>
        </section>
    </div>
</main>
</body>
</html>
