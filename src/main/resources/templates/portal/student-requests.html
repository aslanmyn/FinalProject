<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Requests</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Student Portal</span></a>
        <nav class="main-nav">
            <a href="/news">Portal</a>
            <span class="user-badge student">STUDENT</span>
            <span class="user-email" th:text="${userEmail}"></span>
            <a href="/logout" class="btn-logout">Logout</a>
        </nav>
    </div>
</header>
<main class="page">
    <div class="container">
        <div class="breadcrumb"><a href="/news">Portal</a> / Student Requests</div>
        <h2>Student Requests</h2>
        <p th:if="${requestCreated}" class="alert alert-success">Request submitted.</p>

        <section class="portal-section">
            <h3>Create New Request</h3>
            <form th:action="@{/portal/student-requests/create}" method="post" class="form-grid">
                <div class="form-group">
                    <label>Category</label>
                    <select name="category" required>
                        <option>Reference</option>
                        <option>Academic</option>
                        <option>Data Change</option>
                        <option>Payment</option>
                        <option>Appeal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn">Submit</button>
            </form>
        </section>

        <section class="portal-section">
            <h3>My Requests</h3>
            <table class="data-table">
                <thead><tr><th>ID</th><th>Category</th><th>Status</th><th>Assigned To</th><th>Updated</th></tr></thead>
                <tbody>
                <tr th:each="req : ${requests}">
                    <td th:text="${req.id}"></td>
                    <td th:text="${req.category}"></td>
                    <td th:text="${req.status}"></td>
                    <td th:text="${req.assignedTo != null ? req.assignedTo.fullName : '-'}"></td>
                    <td th:text="${req.updatedAt != null ? #temporals.format(req.updatedAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(requests)}"><td colspan="5">No requests.</td></tr>
                </tbody>
            </table>
        </section>
    </div>
</main>
</body>
</html>
