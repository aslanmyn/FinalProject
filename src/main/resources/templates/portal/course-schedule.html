<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Schedule - KBTU Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Portal</span></a>
            <nav class="main-nav">
                <a href="/news">Portal</a>
                <span class="user-badge student">STUDENT</span>
                <span class="user-email" th:text="${userEmail}"></span>
                <a href="/logout" class="btn-logout">Logout</a>
            </nav>
        </div>
    </header>
    <main class="news-main section-page">
        <div class="container">
            <nav class="breadcrumb"><a href="/news">Portal</a><span class="sep">›</span><span>Course Schedule</span></nav>
            <h2>Course Schedule</h2>
            <div class="section-content">
                <table class="data-table">
                    <thead><tr><th>Subject</th><th>Type</th><th>Day</th><th>Time</th><th>Room</th><th>Teacher</th></tr></thead>
                    <tbody>
                        <tr th:each="so : ${offerings}">
                            <td th:text="${so.subject.name}"></td>
                            <td th:text="${so.lessonType}"></td>
                            <td th:text="${so.dayOfWeek}"></td>
                            <td th:text="${so.startTime + '-' + so.endTime}"></td>
                            <td th:text="${so.room}"></td>
                            <td th:text="${so.teacher != null ? so.teacher.name : '—'}"></td>
                        </tr>
                        <tr th:if="${offerings == null or #lists.isEmpty(offerings)}"><td colspan="6">No schedule</td></tr>
                    </tbody>
                </table>
                <a href="/news" class="back-link">← Back to Portal</a>
            </div>
        </div>
    </main>
    <footer class="site-footer"><p>© 2025 KBTU. Almaty, Kazakhstan.</p></footer>
</body>
</html>
