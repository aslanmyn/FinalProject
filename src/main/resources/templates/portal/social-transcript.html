<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Transcript - KBTU Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Portal</span></a>
            <nav class="main-nav">
                <a href="/news">Portal</a>
                <span class="user-badge student">STUDENT</span>
                <span class="user-email" th:text="${userEmail}"></span>
                <a href="/logout" class="btn-logout">Logout</a>
            </nav>
        </div>
    </header>
    <main class="news-main section-page">
        <div class="container">
            <nav class="breadcrumb"><a href="/news">Portal</a><span class="sep">›</span><span>Social Transcript</span></nav>
            <h2>Social Transcript</h2>
            <div class="section-content">
                <table class="data-table">
                    <thead><tr><th>Activity</th><th>Category</th><th>Hours</th><th>Date</th><th>Confirmed</th></tr></thead>
                    <tbody>
                        <tr th:each="a : ${activities}">
                            <td th:text="${a.title}"></td>
                            <td th:text="${a.category}"></td>
                            <td th:text="${a.hours}"></td>
                            <td th:text="${a.date != null ? #temporals.format(a.date, 'yyyy-MM-dd') : '—'}"></td>
                            <td th:text="${a.confirmed ? 'Yes' : 'No'}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(activities)}"><td colspan="5">No activities</td></tr>
                    </tbody>
                </table>
                <a href="/news" class="back-link">← Back to Portal</a>
            </div>
        </div>
    </main>
    <footer class="site-footer"><p>© 2025 KBTU. Almaty, Kazakhstan.</p></footer>
</body>
</html>
