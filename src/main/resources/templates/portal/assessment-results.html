<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Results</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Student Portal</span></a>
        <nav class="main-nav">
            <a href="/news">Portal</a>
            <span class="user-badge student">STUDENT</span>
            <span class="user-email" th:text="${userEmail}"></span>
            <a href="/logout" class="btn-logout">Logout</a>
        </nav>
    </div>
</header>
<main class="page">
    <div class="container">
        <div class="breadcrumb"><a href="/news">Portal</a> / Assessment Results</div>
        <h2>Attestation / Final Assessment Results</h2>
        <section class="card">
            <table class="data-table">
                <thead><tr><th>Code</th><th>Course</th><th>Score 1</th><th>Score 2</th><th>Score 3</th><th>Letter</th><th>Points</th></tr></thead>
                <tbody>
                <tr th:each="f : ${finalGrades}">
                    <td th:text="${f.subjectOffering != null and f.subjectOffering.subject != null ? f.subjectOffering.subject.code : '-'}"></td>
                    <td th:text="${f.subjectOffering != null and f.subjectOffering.subject != null ? f.subjectOffering.subject.name : '-'}"></td>
                    <td th:text="${scoresByOffering != null and scoresByOffering[f.subjectOffering.id] != null and #lists.size(scoresByOffering[f.subjectOffering.id]) >= 1 ? scoresByOffering[f.subjectOffering.id][0] : '-'}"></td>
                    <td th:text="${scoresByOffering != null and scoresByOffering[f.subjectOffering.id] != null and #lists.size(scoresByOffering[f.subjectOffering.id]) >= 2 ? scoresByOffering[f.subjectOffering.id][1] : '-'}"></td>
                    <td th:text="${scoresByOffering != null and scoresByOffering[f.subjectOffering.id] != null and #lists.size(scoresByOffering[f.subjectOffering.id]) >= 3 ? scoresByOffering[f.subjectOffering.id][2] : '-'}"></td>
                    <td th:text="${f.letterValue != null ? f.letterValue : '-'}"></td>
                    <td th:text="${f.points}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(finalGrades)}"><td colspan="7">No published final grades yet.</td></tr>
                </tbody>
            </table>
        </section>
    </div>
</main>
</body>
</html>
