<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist - KBTU Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Portal</span></a>
            <nav class="main-nav">
                <a href="/news">Portal</a>
                <span class="user-badge student">STUDENT</span>
                <span class="user-email" th:text="${userEmail}"></span>
                <a href="/logout" class="btn-logout">Logout</a>
            </nav>
        </div>
    </header>
    <main class="news-main section-page">
        <div class="container">
            <nav class="breadcrumb"><a href="/news">Portal</a><span class="sep">›</span><span>Checklist</span></nav>
            <h2>Checklist</h2>
            <div class="section-content">
                <table class="data-table">
                    <thead><tr><th>Task</th><th>Deadline</th><th>Status</th><th>Link</th></tr></thead>
                    <tbody>
                        <tr th:each="item : ${items}">
                            <td th:text="${item.title}"></td>
                            <td th:text="${#temporals.format(item.deadline, 'yyyy-MM-dd')}"></td>
                            <td th:text="${item.completed ? 'Done' : 'Pending'}"></td>
                            <td><a th:if="${item.linkToSection}" th:href="${item.linkToSection}" th:text="'Go'">Go</a></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(items)}"><td colspan="4">No items</td></tr>
                    </tbody>
                </table>
                <a href="/news" class="back-link">← Back to Portal</a>
            </div>
        </div>
    </main>
    <footer class="site-footer"><p>© 2025 KBTU. Almaty, Kazakhstan.</p></footer>
</body>
</html>
