<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Admin Portal</span></a>
        <nav class="main-nav">
            <a href="/admin/dashboard">Dashboard</a>
            <span class="user-badge admin">ADMIN</span>
            <span class="user-email" th:text="${userEmail}"></span>
            <a href="/logout" class="btn-logout">Logout</a>
        </nav>
    </div>
</header>
<main class="page">
    <div class="container">
        <h2>Finance Management</h2>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <section class="portal-section">
            <h3>Create Invoice</h3>
            <form method="post" action="/admin/finance/invoice" class="form-inline">
                <select name="studentId" required>
                    <option value="">Select Student</option>
                    <option th:each="s : ${students}" th:value="${s.id}" th:text="${s.name + ' (' + s.email + ')'}"></option>
                </select>
                <input type="number" step="0.01" name="amount" placeholder="Amount" required>
                <input type="text" name="description" placeholder="Description" required>
                <input type="date" name="dueDate" required>
                <button type="submit" class="btn-small">Create Invoice</button>
            </form>
        </section>

        <section class="portal-section">
            <h3>Register Payment</h3>
            <form method="post" action="/admin/finance/payment" class="form-inline">
                <select name="studentId" required>
                    <option value="">Select Student</option>
                    <option th:each="s : ${students}" th:value="${s.id}" th:text="${s.name + ' (' + s.email + ')'}"></option>
                </select>
                <input type="number" name="chargeId" placeholder="Charge ID" required>
                <input type="number" step="0.01" name="amount" placeholder="Amount" required>
                <button type="submit" class="btn-small">Register Payment</button>
            </form>
        </section>

        <section class="portal-section">
            <h3>Active Financial Holds</h3>
            <table class="data-table">
                <thead><tr><th>ID</th><th>Student</th><th>Type</th><th>Reason</th><th>Created</th></tr></thead>
                <tbody>
                <tr th:each="h : ${activeHolds}" th:if="${h.type.name() == 'FINANCIAL'}">
                    <td th:text="${h.id}"></td>
                    <td th:text="${h.student.name}"></td>
                    <td th:text="${h.type}"></td>
                    <td th:text="${h.reason}"></td>
                    <td th:text="${#temporals.format(h.createdAt, 'yyyy-MM-dd')}"></td>
                </tr>
                </tbody>
            </table>
            <a href="/admin/holds" class="btn-small">Manage All Holds</a>
        </section>
    </div>
</main>
</body>
</html>
