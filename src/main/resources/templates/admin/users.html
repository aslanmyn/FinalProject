<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Admin Portal</span></a>
        <nav class="main-nav">
            <a href="/admin/dashboard">Dashboard</a>
            <span class="user-badge admin">ADMIN</span>
            <span class="user-email" th:text="${userEmail}"></span>
            <a href="/logout" class="btn-logout">Logout</a>
        </nav>
    </div>
</header>
<main class="page">
    <div class="container">
        <h2>User Management</h2>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <section class="portal-section">
            <table class="data-table">
                <thead><tr><th>ID</th><th>Email</th><th>Name</th><th>Role</th><th>Permissions</th><th>Enabled</th><th>Manage (Admin only)</th></tr></thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.fullName}"></td>
                    <td th:text="${u.role}"></td>
                    <td th:text="${u.adminPermissions}"></td>
                    <td th:text="${u.enabled}"></td>
                    <td th:if="${u.role.name() == 'ADMIN'}">
                        <form method="post" th:action="@{/admin/users/{id}/permissions(id=${u.id})}">
                            <label><input type="checkbox" name="permissions" value="SUPER" th:checked="${u.adminPermissions.contains(T(ru.kors.finalproject.entity.User.AdminPermission).SUPER)}"> SUPER</label>
                            <label><input type="checkbox" name="permissions" value="REGISTRAR" th:checked="${u.adminPermissions.contains(T(ru.kors.finalproject.entity.User.AdminPermission).REGISTRAR)}"> REGISTRAR</label>
                            <label><input type="checkbox" name="permissions" value="FINANCE" th:checked="${u.adminPermissions.contains(T(ru.kors.finalproject.entity.User.AdminPermission).FINANCE)}"> FINANCE</label>
                            <label><input type="checkbox" name="permissions" value="MOBILITY" th:checked="${u.adminPermissions.contains(T(ru.kors.finalproject.entity.User.AdminPermission).MOBILITY)}"> MOBILITY</label>
                            <label><input type="checkbox" name="permissions" value="SUPPORT" th:checked="${u.adminPermissions.contains(T(ru.kors.finalproject.entity.User.AdminPermission).SUPPORT)}"> SUPPORT</label>
                            <label><input type="checkbox" name="permissions" value="CONTENT" th:checked="${u.adminPermissions.contains(T(ru.kors.finalproject.entity.User.AdminPermission).CONTENT)}"> CONTENT</label>
                            <button type="submit" class="btn-small">Save</button>
                        </form>
                    </td>
                    <td th:unless="${u.role.name() == 'ADMIN'}">-</td>
                </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>
</body>
</html>
