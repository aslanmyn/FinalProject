<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Log - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Admin Portal</span></a>
        <nav class="main-nav">
            <a href="/admin/dashboard">Dashboard</a>
            <span class="user-badge admin">ADMIN</span>
            <span class="user-email" th:text="${userEmail}"></span>
            <a href="/logout" class="btn-logout">Logout</a>
        </nav>
    </div>
</header>
<main class="page">
    <div class="container">
        <h2>Audit Logs (Recent 200)</h2>

        <section class="portal-section">
            <table class="data-table">
                <thead><tr><th>ID</th><th>Actor</th><th>Action</th><th>Entity</th><th>Entity ID</th><th>Details</th><th>Time</th></tr></thead>
                <tbody>
                <tr th:each="l : ${logs}">
                    <td th:text="${l.id}"></td>
                    <td th:text="${l.actorEmail}"></td>
                    <td th:text="${l.action}"></td>
                    <td th:text="${l.entityType}"></td>
                    <td th:text="${l.entityId}"></td>
                    <td th:text="${l.details}" style="max-width:300px;overflow:hidden;text-overflow:ellipsis;"></td>
                    <td th:text="${#temporals.format(l.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(logs)}"><td colspan="7">No audit logs.</td></tr>
                </tbody>
            </table>
        </section>
    </div>
</main>
</body>
</html>
