<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clearance - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Admin Portal</span></a>
        <nav class="main-nav">
            <a href="/admin/dashboard">Dashboard</a>
            <span class="user-badge admin">ADMIN</span>
            <span class="user-email" th:text="${userEmail}"></span>
            <a href="/logout" class="btn-logout">Logout</a>
        </nav>
    </div>
</header>
<main class="page">
    <div class="container">
        <h2>Clearance Management</h2>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <section class="portal-section">
            <table class="data-table">
                <thead><tr><th>Sheet ID</th><th>Student</th><th>Overall Status</th><th>Checkpoints</th></tr></thead>
                <tbody>
                <tr th:each="s : ${sheets}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.student != null ? s.student.name : '-'}"></td>
                    <td th:text="${s.status}"></td>
                    <td>
                        <div th:each="cp : ${s.checkpoints}" style="margin-bottom:4px;">
                            <strong th:text="${cp.department}"></strong>: <span th:text="${cp.status}"></span>
                            <span th:if="${cp.status.name() == 'PENDING'}">
                                <form method="post" th:action="@{/admin/clearance/checkpoint/{id}/review(id=${cp.id})}" style="display:inline;">
                                    <th:block th:replace="~{fragments/csrf :: input}"/>
                                    <input type="hidden" name="approve" value="true">
                                    <button type="submit" class="btn-small">Approve</button>
                                </form>
                                <form method="post" th:action="@{/admin/clearance/checkpoint/{id}/review(id=${cp.id})}" style="display:inline;">
                                    <th:block th:replace="~{fragments/csrf :: input}"/>
                                    <input type="hidden" name="approve" value="false">
                                    <input type="text" name="comment" placeholder="Comment">
                                    <button type="submit" class="btn-small btn-danger">Reject</button>
                                </form>
                            </span>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(sheets)}"><td colspan="4">No clearance sheets.</td></tr>
                </tbody>
            </table>
        </section>
    </div>
</main>
</body>
</html>
