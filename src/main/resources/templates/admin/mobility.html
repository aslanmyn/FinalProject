<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobility - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Admin Portal</span></a>
        <nav class="main-nav">
            <a href="/admin/dashboard">Dashboard</a>
            <span class="user-badge admin">ADMIN</span>
            <span class="user-email" th:text="${userEmail}"></span>
            <a href="/logout" class="btn-logout">Logout</a>
        </nav>
    </div>
</header>
<main class="page">
    <div class="container">
        <h2>Mobility Applications</h2>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <section class="portal-section">
            <table class="data-table">
                <thead><tr><th>ID</th><th>Student</th><th>University</th><th>Status</th><th>Created</th><th>Action</th></tr></thead>
                <tbody>
                <tr th:each="a : ${applications}">
                    <td th:text="${a.id}"></td>
                    <td th:text="${a.student.name}"></td>
                    <td th:text="${a.universityName}"></td>
                    <td th:text="${a.status}"></td>
                    <td th:text="${#temporals.format(a.createdAt, 'yyyy-MM-dd')}"></td>
                    <td>
                        <form method="post" th:action="@{/admin/mobility/{id}/status(id=${a.id})}" style="display:inline;">
                            <select name="status">
                                <option value="IN_REVIEW">IN_REVIEW</option>
                                <option value="APPROVED">APPROVED</option>
                                <option value="REJECTED">REJECTED</option>
                            </select>
                            <button type="submit" class="btn-small">Update</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(applications)}"><td colspan="6">No applications.</td></tr>
                </tbody>
            </table>
        </section>
    </div>
</main>
</body>
</html>
