<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Setup - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Admin Portal</span></a>
        <nav class="main-nav">
            <a href="/admin/dashboard">Dashboard</a>
            <span class="user-badge admin">ADMIN</span>
            <span class="user-email" th:text="${userEmail}"></span>
            <a href="/logout" class="btn-logout">Logout</a>
        </nav>
    </div>
</header>
<main class="page">
    <div class="container">
        <h2>Academic Setup (Registrar)</h2>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <section class="portal-section">
            <h3>Create Term</h3>
            <form method="post" action="/admin/academic/term" class="form-inline">
                <input type="text" name="name" placeholder="e.g. Fall 2026" required>
                <input type="date" name="startDate" required>
                <input type="date" name="endDate" required>
                <label><input type="checkbox" name="current" value="true"> Current</label>
                <button type="submit" class="btn-small">Create Term</button>
            </form>
        </section>

        <section class="portal-section">
            <h3>Terms</h3>
            <table class="data-table">
                <thead><tr><th>ID</th><th>Name</th><th>Start</th><th>End</th><th>Current</th></tr></thead>
                <tbody>
                <tr th:each="t : ${terms}">
                    <td th:text="${t.id}"></td>
                    <td th:text="${t.name}"></td>
                    <td th:text="${t.startDate}"></td>
                    <td th:text="${t.endDate}"></td>
                    <td th:text="${t.current}"></td>
                </tr>
                </tbody>
            </table>
        </section>

        <section class="portal-section">
            <h3>Create Section</h3>
            <form method="post" action="/admin/academic/section" class="form-inline">
                <select name="subjectId" required>
                    <option value="">Select Subject</option>
                    <option th:each="s : ${subjects}" th:value="${s.id}" th:text="${s.code + ' - ' + s.name}"></option>
                </select>
                <select name="semesterId" required>
                    <option value="">Select Semester</option>
                    <option th:each="t : ${terms}" th:value="${t.id}" th:text="${t.name}"></option>
                </select>
                <select name="teacherId">
                    <option value="">No teacher</option>
                    <option th:each="t : ${teachers}" th:value="${t.id}" th:text="${t.name}"></option>
                </select>
                <input type="number" name="capacity" placeholder="Capacity" value="30" required>
                <select name="lessonType" required>
                    <option value="LECTURE">LECTURE</option>
                    <option value="PRACTICE">PRACTICE</option>
                    <option value="LAB">LAB</option>
                </select>
                <button type="submit" class="btn-small">Create Section</button>
            </form>
        </section>

        <section class="portal-section">
            <h3>Current Semester Sections</h3>
            <table class="data-table">
                <thead><tr><th>ID</th><th>Subject</th><th>Teacher</th><th>Capacity</th><th>Type</th></tr></thead>
                <tbody>
                <tr th:each="s : ${sections}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.subject.code + ' - ' + s.subject.name}"></td>
                    <td th:text="${s.teacher != null ? s.teacher.name : 'Unassigned'}"></td>
                    <td th:text="${s.capacity}"></td>
                    <td th:text="${s.lessonType}"></td>
                </tr>
                </tbody>
            </table>
        </section>

        <section class="portal-section">
            <h3>Add Meeting Time</h3>
            <form method="post" action="/admin/academic/meeting-time" class="form-inline">
                <select name="sectionId" required>
                    <option value="">Select Section</option>
                    <option th:each="s : ${sections}" th:value="${s.id}" th:text="${'#' + s.id + ' ' + s.subject.code}"></option>
                </select>
                <select name="dayOfWeek" required>
                    <option value="MONDAY">Monday</option>
                    <option value="TUESDAY">Tuesday</option>
                    <option value="WEDNESDAY">Wednesday</option>
                    <option value="THURSDAY">Thursday</option>
                    <option value="FRIDAY">Friday</option>
                    <option value="SATURDAY">Saturday</option>
                </select>
                <input type="time" name="startTime" required>
                <input type="time" name="endTime" required>
                <input type="text" name="room" placeholder="Room" required>
                <select name="lessonType" required>
                    <option value="LECTURE">LECTURE</option>
                    <option value="PRACTICE">PRACTICE</option>
                    <option value="LAB">LAB</option>
                </select>
                <button type="submit" class="btn-small">Add</button>
            </form>
        </section>

        <section class="portal-section">
            <h3>Registration Windows</h3>
            <form method="post" action="/admin/academic/window" class="form-inline">
                <select name="semesterId" required>
                    <option value="">Select Semester</option>
                    <option th:each="t : ${terms}" th:value="${t.id}" th:text="${t.name}"></option>
                </select>
                <select name="type" required>
                    <option value="REGISTRATION">REGISTRATION</option>
                    <option value="ADD_DROP">ADD_DROP</option>
                    <option value="FX">FX</option>
                    <option value="GRADE_PUBLISH">GRADE_PUBLISH</option>
                </select>
                <input type="date" name="startDate" required>
                <input type="date" name="endDate" required>
                <label><input type="checkbox" name="active" value="true" checked> Active</label>
                <button type="submit" class="btn-small">Save Window</button>
            </form>
        </section>

        <section class="portal-section">
            <h3>Manual Enrollment Override</h3>
            <form method="post" action="/admin/academic/override-enroll" class="form-inline">
                <input type="number" name="studentId" placeholder="Student ID" required>
                <input type="number" name="sectionId" placeholder="Section ID" required>
                <input type="text" name="reason" placeholder="Reason" required>
                <button type="submit" class="btn-small">Override Enroll</button>
            </form>
        </section>
    </div>
</main>
</body>
</html>
