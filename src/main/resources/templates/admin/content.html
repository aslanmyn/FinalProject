<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Management - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo"><h1>KBTU</h1><span class="tagline">Admin Portal</span></a>
        <nav class="main-nav">
            <a href="/admin/dashboard">Dashboard</a>
            <span class="user-badge admin">ADMIN</span>
            <span class="user-email" th:text="${userEmail}"></span>
            <a href="/logout" class="btn-logout">Logout</a>
        </nav>
    </div>
</header>
<main class="page">
    <div class="container">
        <h2>Content Management</h2>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <section class="portal-section">
            <h3>Create News</h3>
            <form method="post" action="/admin/content/news">
                <input type="text" name="title" placeholder="Title" required style="width:100%;margin-bottom:8px;">
                <textarea name="content" placeholder="Content" required rows="4" style="width:100%;margin-bottom:8px;"></textarea>
                <input type="text" name="category" placeholder="Category (optional)" style="margin-bottom:8px;">
                <button type="submit" class="btn-small">Publish News</button>
            </form>
        </section>

        <section class="portal-section">
            <h3>News</h3>
            <table class="data-table">
                <thead><tr><th>ID</th><th>Title</th><th>Category</th><th>Created</th></tr></thead>
                <tbody>
                <tr th:each="n : ${newsList}">
                    <td th:text="${n.id}"></td>
                    <td th:text="${n.title}"></td>
                    <td th:text="${n.category}"></td>
                    <td th:text="${#temporals.format(n.createdAt, 'yyyy-MM-dd')}"></td>
                </tr>
                </tbody>
            </table>
        </section>

        <section class="portal-section">
            <h3>Create Survey</h3>
            <form method="post" action="/admin/content/survey" class="form-inline">
                <input type="text" name="title" placeholder="Survey Title" required>
                <input type="date" name="startDate" required>
                <input type="date" name="endDate" required>
                <label><input type="checkbox" name="anonymous" value="true"> Anonymous</label>
                <button type="submit" class="btn-small">Create Survey</button>
            </form>
        </section>

        <section class="portal-section">
            <h3>Surveys</h3>
            <table class="data-table">
                <thead><tr><th>ID</th><th>Title</th><th>Start</th><th>End</th><th>Anonymous</th><th>Action</th></tr></thead>
                <tbody>
                <tr th:each="s : ${surveys}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.title}"></td>
                    <td th:text="${s.startDate}"></td>
                    <td th:text="${s.endDate}"></td>
                    <td th:text="${s.anonymous}"></td>
                    <td>
                        <form method="post" th:action="@{/admin/content/survey/{id}/close(id=${s.id})}" style="display:inline;">
                            <button type="submit" class="btn-small btn-danger">Close</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>
</body>
</html>
