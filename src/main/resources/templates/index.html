<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBTU Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="header-content">
        <a href="/" class="logo">
            <h1>KBTU</h1><span class="tagline">University Portal</span>
        </a>
        <nav class="main-nav">
            <a href="/news">Portal</a>
            <a href="/login" class="btn-login">Sign In</a>
        </nav>
    </div>
</header>

<main class="page">
    <div class="container">
        <section class="card">
            <h2>University System</h2>
            <p>Student, teacher and admin workflows in one portal with API support for mobile clients.</p>
            <p>
                <a href="/login" class="btn">Go to Login</a>
                <a href="/register" class="btn">Register</a>
            </p>
        </section>
    </div>
</main>

<footer class="site-footer">
    <p>&copy; KBTU Portal</p>
</footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
