# H2 In-Memory Database (default for local development / demo)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional, available at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# WARNING: create-drop destroys all data on restart. This is intentional for demo mode.
# For production use 'validate' or 'none' with Flyway/Liquibase migrations.
spring.jpa.hibernate.ddl-auto=create-drop
# Flyway disabled for H2 demo — schema managed by Hibernate
spring.flyway.enabled=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Mobile API JWT
# IMPORTANT: Override via environment variable JWT_SECRET in production!
# Example: JWT_SECRET=your-random-64-char-secret-here
app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-key-for-production}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:720}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Structured Logging
logging.level.ru.kors.finalproject=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
spring.jpa.open-in-view=false
