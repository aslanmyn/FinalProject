spring.profiles.active=${APP_PROFILE:postgres}

# Shared JPA behavior
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway (enabled in postgres profile, disabled in h2 profile)
spring.flyway.locations=classpath:db/migration

# Mobile API JWT (override in production)
app.jwt.secret=${JWT_SECRET:5b636ebbcf1dad054f31eb0acce1c1fceaca10c4401e346f587a180b421bd85b06f31826c1a35578d5ef516e09165fc94506e378d16082078de11a3a5fd72393}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:720}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:30}

# Local file storage
app.storage.root=${APP_STORAGE_ROOT:./storage}
app.storage.max-file-size-mb=${APP_STORAGE_MAX_FILE_MB:20}
app.storage.allowed-content-types=${APP_STORAGE_ALLOWED_CONTENT_TYPES:application/pdf,image/png,image/jpeg,application/zip,text/plain,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet}
app.storage.link-ttl-minutes=${APP_STORAGE_LINK_TTL_MINUTES:30}
app.storage.signing-secret=${APP_STORAGE_SIGNING_SECRET:e9a8c8de57cfd032888036bae88f9dce337ac306f811d88877b8075bab1f12473cf90899e7a17483d5da7407417b972e910c91e22da3facdf97adad0e78127e5}
spring.servlet.multipart.max-file-size=${APP_MULTIPART_MAX_FILE_SIZE:25MB}
spring.servlet.multipart.max-request-size=${APP_MULTIPART_MAX_REQUEST_SIZE:25MB}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.ru.kors.finalproject=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
