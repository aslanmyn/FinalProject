spring.config.import=optional:file:.env.local[.properties]
spring.profiles.active=${APP_PROFILE:postgres}
app.web.frontend-url=${APP_WEB_FRONTEND_URL:http://localhost:5173}

# Shared JPA behavior
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway (enabled in postgres profile, disabled in h2 profile)
spring.flyway.locations=classpath:db/migration

# Mobile API JWT (override in production)
app.jwt.secret=${JWT_SECRET:dev-only-jwt-secret-change-this-in-production-very-long-string}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:720}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:30}

# Local file storage
app.storage.root=${APP_STORAGE_ROOT:./storage}
app.storage.max-file-size-mb=${APP_STORAGE_MAX_FILE_MB:20}
app.storage.allowed-content-types=${APP_STORAGE_ALLOWED_CONTENT_TYPES:application/pdf,image/png,image/jpeg,application/zip,text/plain,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet}
app.storage.link-ttl-minutes=${APP_STORAGE_LINK_TTL_MINUTES:30}
app.storage.signing-secret=${APP_STORAGE_SIGNING_SECRET:dev-only-storage-signing-secret-change-this-in-production}
spring.servlet.multipart.max-file-size=${APP_MULTIPART_MAX_FILE_SIZE:25MB}
spring.servlet.multipart.max-request-size=${APP_MULTIPART_MAX_REQUEST_SIZE:25MB}

# Seed demo data:
# disabled by default and additionally guarded by a confirm token
app.seed.enabled=${APP_SEED_ENABLED:false}
app.seed.confirm-token=${APP_SEED_CONFIRM_TOKEN:}

# CORS for separate frontend app
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# AI assistant
app.ai.enabled=${AI_ASSISTANT_ENABLED:false}
app.ai.read-only=${AI_ASSISTANT_READ_ONLY:true}
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.ai.locale=${AI_ASSISTANT_LOCALE:ru}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.ru.kors.finalproject=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
