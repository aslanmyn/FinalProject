name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: final_project_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: ./mvnw -B verify --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: postgres
          DB_URL: jdbc:postgresql://localhost:5432/final_project_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          APP_SEED_ENABLED: "false"
          AI_ASSISTANT_ENABLED: "false"
          JWT_SECRET: ci-test-secret-key-that-is-at-least-64-bytes-long-for-hmac-sha512
          APP_STORAGE_SIGNING_SECRET: ci-test-signing-secret-key-at-least-64-bytes-long-for-hmac-sha512
          APP_STORAGE_ROOT: ./storage-test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
