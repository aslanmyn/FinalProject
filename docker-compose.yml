services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finalproject-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PROFILE: postgres
      APP_WEB_FRONTEND_URL: ${APP_WEB_FRONTEND_URL:-http://localhost:3000}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-final_project}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      APP_STORAGE_ROOT: /app/storage
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-false}
      PORT: 8080
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    volumes:
      - finalproject_storage:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: finalproject-frontend
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"

  postgres:
    image: postgres:15
    container_name: finalproject-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-final_project}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - finalproject_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  finalproject_pgdata:
  finalproject_storage:
